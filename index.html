<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventuras con las Tablas</title>
    
    <!-- Cargamos React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Cargamos Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Cargamos Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Estilos -->
    <style>
        @media print {
            @page { margin: 1.5cm; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; -webkit-print-color-adjust: exact; }
            
            table { width: 100%; border-collapse: collapse; font-size: 11pt; }
            th { background-color: #e0e7ff !important; color: #1e3a8a !important; padding: 6px; border: 1px solid #cbd5e1; }
            td { padding: 6px; border: 1px solid #cbd5e1; }
            tr:nth-child(even) { background-color: #f8fafc !important; }
            tr { page-break-inside: avoid; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
    </style>
</head>
<body class="bg-indigo-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Iconos ---
        const IconBase = ({ children, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{children}</svg>
        );
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
        const Check = (props) => <IconBase {...props}><polyline points="20 6 9 17 4 12"/></IconBase>;
        const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
        const RotateCcw = (props) => <IconBase {...props}><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></IconBase>;
        const Award = (props) => <IconBase {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconBase>;
        const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconBase>;
        const Printer = (props) => <IconBase {...props}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const Eye = (props) => <IconBase {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const EyeOff = (props) => <IconBase {...props}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></IconBase>;
        const Shuffle = (props) => <IconBase {...props}><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></IconBase>;
        const ListOrdered = (props) => <IconBase {...props}><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></IconBase>;

        // --- Componente Tutorial Modal ---
        const TutorialModal = ({ onClose }) => (
            <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
                    <div className="bg-blue-600 p-4 text-white flex justify-between items-center">
                        <h2 className="text-2xl font-bold flex items-center gap-2"><BookOpen/> Cómo Jugar</h2>
                        <button onClick={onClose} className="hover:bg-blue-700 p-1 rounded-full"><X/></button>
                    </div>
                    
                    <div className="p-6 overflow-y-auto custom-scroll space-y-6 text-gray-700">
                        <section>
                            <h3 className="text-lg font-bold text-blue-600 mb-2">1. Los Modos de Juego</h3>
                            <p className="mb-2">El juego tiene dos partes y puedes cambiar cuando quieras:</p>
                            <ul className="list-disc pl-5 space-y-1">
                                <li><strong>Modo Ordenado:</strong> Preguntas en orden (1x1, 1x2...).</li>
                                <li><strong>Modo Aleatorio:</strong> Preguntas salteadas para retar tu mente.</li>
                            </ul>
                        </section>

                        <section>
                            <h3 className="text-lg font-bold text-blue-600 mb-2">2. Botones y Ayudas</h3>
                            <ul className="space-y-3">
                                <li className="flex items-start gap-3">
                                    <div className="bg-gray-200 p-2 rounded text-xs font-bold whitespace-nowrap">No lo sé 😓</div>
                                    <p>Si te trabas, úsalo. Te diré la respuesta para que la aprendas.</p>
                                </li>
                                <li className="flex items-start gap-3">
                                    <div className="bg-indigo-600 text-white p-2 rounded text-xs font-bold whitespace-nowrap">¡Comprobar!</div>
                                    <p>Escribe tu respuesta y pulsa este botón (o presiona ENTER).</p>
                                </li>
                                <li className="flex items-start gap-3">
                                    <div className="flex items-center gap-1 bg-yellow-100 px-2 rounded border border-yellow-300"><Eye size={16}/> Ayuda Visual</div>
                                    <p>Muestra u oculta los puntos de colores.</p>
                                </li>
                            </ul>
                        </section>

                        <section>
                            <h3 className="text-lg font-bold text-blue-600 mb-2">3. Guardar tus Logros</h3>
                            <p>Cuando decidas parar, pulsa <strong>"Terminar Sesión"</strong>. Podrás:</p>
                            <ul className="list-disc pl-5 mt-2">
                                <li><strong>Descargar Imagen:</strong> Un diploma bonito.</li>
                                <li><strong>Guardar PDF:</strong> Una lista completa que incluye <strong>cuánto tiempo tardaste</strong> en cada respuesta.</li>
                            </ul>
                        </section>
                    </div>
                    
                    <div className="p-4 border-t bg-gray-50 text-center">
                        <button onClick={onClose} className="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-8 rounded-full shadow-lg transition transform hover:scale-105">
                            ¡Entendido, a jugar!
                        </button>
                    </div>
                </div>
            </div>
        );

        // --- Aplicación Principal ---
        const App = () => {
            const [gameState, setGameState] = useState('welcome');
            const [showTutorial, setShowTutorial] = useState(false);
            const [showVisualHelp, setShowVisualHelp] = useState(true);
            
            const [currentFactorA, setCurrentFactorA] = useState(1);
            const [currentFactorB, setCurrentFactorB] = useState(1);
            const [userAnswer, setUserAnswer] = useState('');
            const [feedback, setFeedback] = useState(null); 
            const [seqIndex, setSeqIndex] = useState(0); 

            // Estadísticas y Tiempos
            const [stats, setStats] = useState({});
            const [history, setHistory] = useState([]);
            const [startTime, setStartTime] = useState(null);
            const [elapsedSeconds, setElapsedSeconds] = useState(0);
            const [questionStartTime, setQuestionStartTime] = useState(null);

            const inputRef = useRef(null);
            const timerRef = useRef(null);

            // Helper para formatear fecha para archivos: dd_mm_aaaa_HH_mm
            const getFormattedDateString = () => {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                const H = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                return `${d}_${m}_${y}_${H}_${min}`;
            };

            // Inicializar estadísticas vacías
            useEffect(() => {
                const initialStats = {};
                for (let i = 1; i <= 10; i++) {
                    for (let j = 1; j <= 10; j++) {
                        initialStats[`${i}x${j}`] = { asked: 0, correct: 0, givenUp: 0, wrongAttempts: 0 };
                    }
                }
                setStats(initialStats);
            }, []);

            // Foco en input
            useEffect(() => {
                if ((gameState === 'sequential' || gameState === 'random') && !feedback) {
                    setTimeout(() => inputRef.current?.focus(), 100);
                }
            }, [currentFactorA, currentFactorB, feedback, gameState]);

            // Cronómetro de sesión
            useEffect(() => {
                if ((gameState === 'sequential' || gameState === 'random') && startTime) {
                    timerRef.current = setInterval(() => {
                        const now = Date.now();
                        setElapsedSeconds(Math.floor((now - startTime) / 1000));
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [gameState, startTime]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const startGame = () => {
                setGameState('sequential');
                setSeqIndex(0);
                setQuestion(1, 1);
                setFeedback(null);
                setUserAnswer('');
                setHistory([]);
                const now = Date.now();
                setStartTime(now);
                setQuestionStartTime(now);
                setElapsedSeconds(0);
                
                // IMPORTANTE: Resetear stats al iniciar nuevo juego
                const resetStats = {};
                for (let i = 1; i <= 10; i++) {
                    for (let j = 1; j <= 10; j++) {
                        resetStats[`${i}x${j}`] = { asked: 0, correct: 0, givenUp: 0, wrongAttempts: 0 };
                    }
                }
                setStats(resetStats);
            };

            const toggleMode = () => {
                if (gameState === 'sequential') {
                    setGameState('random');
                    generateRandomQuestion(); 
                } else if (gameState === 'random') {
                    setGameState('sequential');
                    if (seqIndex >= 100) {
                        setSeqIndex(0);
                        setQuestion(1, 1);
                    } else {
                        const nextA = Math.floor(seqIndex / 10) + 1;
                        const nextB = (seqIndex % 10) + 1;
                        setQuestion(nextA, nextB);
                    }
                }
            };

            const setQuestion = (a, b) => {
                setCurrentFactorA(a);
                setCurrentFactorB(b);
                setQuestionStartTime(Date.now());
                
                // CORRECCIÓN: NO actualizamos stats aquí. 
                // Stats solo se actualizan al responder.
                // Esto evita que preguntas solo "vistas" cuenten como intentos.
            };

            const updateStats = (a, b, type) => {
                setStats(prev => {
                    const currentStat = prev[`${a}x${b}`];
                    return {
                        ...prev,
                        [`${a}x${b}`]: {
                            ...currentStat,
                            asked: currentStat.asked + 1, // Ahora sí sumamos el intento
                            correct: type === 'correct' ? currentStat.correct + 1 : currentStat.correct,
                            wrongAttempts: type === 'incorrect' ? currentStat.wrongAttempts + 1 : currentStat.wrongAttempts,
                            givenUp: type === 'givenUp' ? currentStat.givenUp + 1 : currentStat.givenUp
                        }
                    };
                });
            };

            const addToHistory = (isCorrect, givenAnswer) => {
                const timeTaken = ((Date.now() - questionStartTime) / 1000).toFixed(1);
                setHistory(prev => [
                    ...prev,
                    {
                        question: `${currentFactorA} x ${currentFactorB}`,
                        correctAnswer: currentFactorA * currentFactorB,
                        userAnswer: givenAnswer,
                        isCorrect: isCorrect,
                        timeTaken: timeTaken,
                        timestamp: new Date().toLocaleTimeString('es-ES')
                    }
                ]);
            };

            const handleCheck = () => {
                if (!userAnswer || userAnswer.trim() === '') return;

                const correctAnswer = currentFactorA * currentFactorB;
                const numAnswer = parseInt(userAnswer);

                if (numAnswer === correctAnswer) {
                    setFeedback('correct');
                    addToHistory(true, numAnswer);

                    if (feedback !== 'showAnswer') {
                        // Actualizar stats solo si es la primera vez que acierta en este turno
                        // (aunque con la lógica actual pasamos de pregunta inmediatamente)
                        updateStats(currentFactorA, currentFactorB, 'correct');
                    }
                    setTimeout(nextQuestion, 1500);
                } else {
                    setFeedback('incorrect');
                    addToHistory(false, numAnswer);
                    updateStats(currentFactorA, currentFactorB, 'incorrect');
                    
                    setUserAnswer('');
                    setTimeout(() => setFeedback(null), 1000);
                }
            };

            const handleGiveUp = () => {
                setFeedback('showAnswer');
                addToHistory(false, "No sabía");
                updateStats(currentFactorA, currentFactorB, 'givenUp');
            };

            const nextQuestion = () => {
                setUserAnswer('');
                setFeedback(null);

                if (gameState === 'sequential') {
                    const nextIndex = seqIndex + 1;
                    if (nextIndex < 100) {
                        setSeqIndex(nextIndex);
                        const nextA = Math.floor(nextIndex / 10) + 1;
                        const nextB = (nextIndex % 10) + 1;
                        setQuestion(nextA, nextB);
                    } else {
                        setGameState('random');
                        generateRandomQuestion();
                    }
                } else if (gameState === 'random') {
                    generateRandomQuestion();
                }
            };

            const generateRandomQuestion = () => {
                const a = Math.floor(Math.random() * 10) + 1;
                const b = Math.floor(Math.random() * 10) + 1;
                setQuestion(a, b);
            };

            const finishGame = () => {
                setGameState('summary');
                clearInterval(timerRef.current);
            };

            // --- Generación de Reportes ---
            const downloadReportImage = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const width = 1000;
                const height = 1200;
                canvas.width = width;
                canvas.height = height;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = '#1e3a8a';
                ctx.fillRect(0, 0, width, 100);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Reporte de Tablas de Multiplicar', width / 2, 65);

                ctx.fillStyle = '#333';
                ctx.font = '20px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`Fecha: ${new Date().toLocaleDateString()}`, 50, 140);
                ctx.fillText(`Tiempo Total: ${formatTime(elapsedSeconds)}`, 50, 170);

                const startX = 50;
                const startY = 220;
                const cellSize = 90;

                for (let i = 1; i <= 10; i++) {
                    for (let j = 1; j <= 10; j++) {
                        const x = startX + (j - 1) * cellSize;
                        const y = startY + (i - 1) * cellSize;
                        const key = `${i}x${j}`;
                        const data = stats[key];
                        
                        let color = '#f3f4f6';
                        if (data.asked > 0) {
                            if (data.givenUp > 0) color = '#fee2e2';
                            else if (data.wrongAttempts > 0) color = '#fef9c3';
                            else color = '#dcfce7';
                        }

                        ctx.fillStyle = color;
                        ctx.fillRect(x, y, cellSize - 4, cellSize - 4);
                        
                        ctx.fillStyle = '#000';
                        ctx.textAlign = 'center';
                        ctx.font = 'bold 18px sans-serif';
                        ctx.fillText(`${i}x${j}`, x + cellSize/2, y + 25);
                        
                        if (data.asked > 0) {
                            ctx.font = '14px sans-serif';
                            ctx.fillStyle = '#374151';
                            ctx.fillText(`Total: ${data.asked}`, x + cellSize/2, y + 45);
                            ctx.fillStyle = '#166534';
                            ctx.fillText(`✅: ${data.correct}`, x + cellSize/2, y + 62);
                            ctx.fillStyle = '#991b1b';
                            const incorrectas = data.wrongAttempts + data.givenUp;
                            ctx.fillText(`❌: ${incorrectas}`, x + cellSize/2, y + 79);
                        }
                    }
                }

                ctx.textAlign = 'center';
                ctx.fillStyle = '#666';
                ctx.font = 'italic 16px sans-serif';
                ctx.fillText('Nota: Para ver el tiempo por pregunta, usa la opción "Guardar PDF".', width/2, height - 30);

                const link = document.createElement('a');
                // Formato solicitado: Resumen_dd_mm_aaaa_hora
                const fileName = `Resumen_${getFormattedDateString()}.png`;
                link.download = fileName;
                link.href = canvas.toDataURL();
                link.click();
            };

            const handlePrint = () => {
                // Cambiar el título temporalmente para que el PDF se guarde con el nombre correcto
                const originalTitle = document.title;
                document.title = `Reporte_multiplicaciones_${getFormattedDateString()}`;
                
                window.print();
                
                // Restaurar título original después de un breve delay
                setTimeout(() => {
                    document.title = originalTitle;
                }, 1000);
            };

            // --- Vistas ---

            if (gameState === 'welcome') {
                return (
                    <div className="min-h-screen bg-blue-50 flex flex-col items-center justify-center p-4 font-sans no-print">
                        {showTutorial && <TutorialModal onClose={() => setShowTutorial(false)} />}
                        
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-lg w-full text-center border-4 border-blue-200">
                            <h1 className="text-4xl font-extrabold text-blue-600 mb-6">¡Aventuras con las Tablas! 🚀</h1>
                            <p className="text-gray-600 mb-8 text-lg">
                                Aprende, practica y reta a tu memoria con las tablas del 1 al 10.
                            </p>
                            
                            <div className="flex flex-col gap-4">
                                <button 
                                    onClick={startGame}
                                    className="bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 flex items-center justify-center gap-2"
                                >
                                    <Play size={32} />
                                    ¡Empezar a Jugar!
                                </button>
                                
                                <button 
                                    onClick={() => setShowTutorial(true)}
                                    className="bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-3 px-8 rounded-full shadow transition flex items-center justify-center gap-2"
                                >
                                    <BookOpen size={24} />
                                    ¿Cómo funciona?
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'summary') {
                return (
                    <div className="min-h-screen bg-gray-50 font-sans">
                        <div className="no-print p-4 flex flex-col items-center min-h-screen">
                            <div className="max-w-4xl w-full bg-white rounded-3xl shadow-xl border-4 border-indigo-100 overflow-hidden">
                                <div className="bg-indigo-600 p-6 text-white text-center">
                                    <div className="flex justify-center mb-2"><Award className="w-16 h-16 text-yellow-300" /></div>
                                    <h2 className="text-3xl font-bold">¡Sesión Terminada!</h2>
                                    <p className="opacity-90 mt-2 text-xl font-mono">Tiempo Total: {formatTime(elapsedSeconds)}</p>
                                </div>

                                <div className="p-8">
                                    <div className="flex flex-col md:flex-row gap-4 justify-center mb-8">
                                        <button 
                                            onClick={handlePrint}
                                            className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md transition"
                                        >
                                            <Printer size={20} />
                                            Imprimir / Guardar PDF Detallado
                                        </button>
                                        <button 
                                            onClick={downloadReportImage}
                                            className="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md transition"
                                        >
                                            <Download size={20} />
                                            Descargar Imagen (Diploma)
                                        </button>
                                        <button 
                                            onClick={() => setGameState('welcome')}
                                            className="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md transition"
                                        >
                                            <RotateCcw size={20} />
                                            Volver al Inicio
                                        </button>
                                    </div>

                                    <div className="text-center text-gray-500 mb-6">
                                        <p>👇 Mira un avance del historial aquí abajo, o descarga el PDF para verlo completo.</p>
                                    </div>

                                    <div className="border rounded-lg overflow-hidden">
                                        <div className="bg-gray-100 p-3 font-bold text-gray-700 border-b">Últimos intentos (En pantalla)</div>
                                        <div className="divide-y max-h-60 overflow-y-auto">
                                            {history.slice().reverse().slice(0, 10).map((item, idx) => (
                                                <div key={idx} className="p-3 flex justify-between items-center bg-white">
                                                    <span className="font-bold text-gray-800">{item.question}</span>
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-sm font-mono text-gray-500 bg-gray-100 px-2 py-1 rounded">{item.timeTaken}s</span>
                                                        <span className="text-sm text-gray-500">Resp: {item.userAnswer}</span>
                                                        {item.isCorrect ? 
                                                            <span className="text-green-600 font-bold flex items-center gap-1"><Check size={16}/></span> : 
                                                            <span className="text-red-500 font-bold flex items-center gap-1"><X size={16}/></span>
                                                        }
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* --- SECCIÓN PARA PDF (Solo visible al imprimir) --- */}
                        <div className="print-only hidden p-8 bg-white text-black">
                            <div className="text-center border-b-2 border-indigo-900 pb-4 mb-6">
                                <h1 className="text-3xl font-extrabold text-indigo-900 mb-2">Reporte Detallado de Práctica</h1>
                                <p className="text-gray-600">Tablas de Multiplicar</p>
                                <div className="mt-2 text-sm flex justify-center gap-6">
                                    <span><strong>Fecha:</strong> {new Date().toLocaleDateString()}</span>
                                    <span><strong>Duración:</strong> {formatTime(elapsedSeconds)}</span>
                                </div>
                            </div>

                            <div className="flex justify-between gap-4 mb-8 text-center bg-gray-50 p-4 rounded border border-gray-200">
                                 <div>
                                    <div className="text-xs uppercase text-gray-500 font-bold">Total Intentos</div>
                                    <div className="text-2xl font-bold text-gray-800">{history.length}</div>
                                 </div>
                                 <div>
                                    <div className="text-xs uppercase text-gray-500 font-bold">Aciertos</div>
                                    <div className="text-2xl font-bold text-green-600">{history.filter(h => h.isCorrect).length}</div>
                                 </div>
                                 <div>
                                    <div className="text-xs uppercase text-gray-500 font-bold">Errores / Ayudas</div>
                                    <div className="text-2xl font-bold text-red-600">{history.filter(h => !h.isCorrect).length}</div>
                                 </div>
                                 <div>
                                    <div className="text-xs uppercase text-gray-500 font-bold">Nota Final</div>
                                    <div className="text-2xl font-bold text-indigo-600">
                                        {history.length > 0 
                                            ? Math.round((history.filter(h => h.isCorrect).length / history.length) * 100) 
                                            : 0}%
                                    </div>
                                 </div>
                            </div>

                            <h3 className="text-xl font-bold mb-4 text-indigo-900 border-l-4 border-indigo-600 pl-3">Historial Completo de Intentos</h3>
                            
                            <table className="w-full text-left">
                                <thead>
                                    <tr>
                                        <th className="w-10 text-center">#</th>
                                        <th>Hora</th>
                                        <th className="text-center">Tiempo</th>
                                        <th>Pregunta</th>
                                        <th className="text-center">R. Correcta</th>
                                        <th className="text-center">R. Niño</th>
                                        <th>Resultado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {history.map((item, idx) => (
                                        <tr key={idx}>
                                            <td className="text-center text-gray-500 font-mono text-sm">{idx + 1}</td>
                                            <td className="text-sm text-gray-600">{item.timestamp}</td>
                                            <td className="text-center font-mono text-blue-800 bg-blue-50">{item.timeTaken}s</td>
                                            <td className="font-bold text-indigo-900 text-lg">{item.question}</td>
                                            <td className="text-center font-mono font-bold">{item.correctAnswer}</td>
                                            <td className="text-center font-mono">{item.userAnswer}</td>
                                            <td>
                                                {item.isCorrect ? 
                                                    <span className="text-green-700 font-bold flex items-center gap-1">✅ Correcto</span> : 
                                                    <span className="text-red-600 font-bold flex items-center gap-1">❌ Incorrecto</span>
                                                }
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            
                            <div className="mt-8 text-center text-xs text-gray-400 pt-4 border-t">
                                Reporte generado por Aventuras con las Tablas
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4 font-sans no-print transition-colors duration-500 relative">
                    {/* Botón flotante de ayuda */}
                    <button 
                        onClick={() => setShowTutorial(true)}
                        className="absolute top-4 right-4 bg-blue-100 p-2 rounded-full text-blue-600 hover:bg-blue-200 transition z-10 shadow-sm"
                        title="Ver ayuda"
                    >
                        <BookOpen size={24} />
                    </button>
                    {showTutorial && <TutorialModal onClose={() => setShowTutorial(false)} />}

                    <div className="w-full max-w-lg flex flex-col gap-3 mb-6">
                         {/* Barra de estado superior */}
                        <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-indigo-100">
                             <div className="flex items-center gap-2">
                                <button 
                                    onClick={toggleMode}
                                    className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-bold transition-all border-2
                                        ${gameState === 'sequential' 
                                            ? 'border-indigo-500 bg-indigo-50 text-indigo-700' 
                                            : 'border-purple-500 bg-purple-50 text-purple-700'
                                        }`}
                                    title="Haz clic para cambiar de modo"
                                >
                                    {gameState === 'sequential' ? <ListOrdered size={16}/> : <Shuffle size={16}/>}
                                    {gameState === 'sequential' ? 'Ordenado' : 'Aleatorio'}
                                </button>
                             </div>
                             
                             <div className="flex items-center gap-2 font-mono text-lg font-bold text-gray-700 bg-gray-100 px-3 py-1 rounded-lg">
                                <Clock size={20} className="text-indigo-500"/>
                                {formatTime(elapsedSeconds)}
                             </div>
                        </div>

                        <div className="flex justify-end">
                            <button 
                                onClick={finishGame}
                                className="bg-red-100 hover:bg-red-200 text-red-600 px-4 py-2 rounded-full text-xs font-bold transition"
                            >
                                Terminar Sesión
                            </button>
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-lg w-full text-center border-b-8 border-indigo-200 relative overflow-hidden">
                        
                        {gameState === 'sequential' && (
                            <div className="absolute top-0 left-0 w-full h-2 bg-gray-100">
                                <div 
                                    className="h-full bg-green-400 transition-all duration-300" 
                                    style={{ width: `${((seqIndex) / 100) * 100}%` }}
                                ></div>
                            </div>
                        )}

                        <div className="mb-8 mt-4">
                            <p className="text-gray-500 uppercase tracking-widest text-xs font-bold mb-2">¿Cuánto es?</p>
                            <div className="flex items-center justify-center gap-4 text-6xl font-black text-gray-800">
                                <span>{currentFactorA}</span>
                                <span className="text-indigo-400">×</span>
                                <span>{currentFactorB}</span>
                                <span className="text-gray-300">=</span>
                                {feedback === 'showAnswer' ? (
                                    <span className="text-green-600 animate-pulse">{currentFactorA * currentFactorB}</span>
                                ) : (
                                    <span className="text-gray-200">?</span>
                                )}
                            </div>
                        </div>

                        <div className="flex flex-col items-center gap-4">
                            {feedback !== 'showAnswer' && (
                                <div className="relative w-full max-w-xs">
                                    <input
                                        ref={inputRef}
                                        type="number"
                                        value={userAnswer}
                                        onChange={(e) => setUserAnswer(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleCheck()}
                                        placeholder="?"
                                        className={`w-full text-center text-4xl font-bold py-4 rounded-2xl border-4 outline-none transition-all
                                            ${feedback === 'incorrect' ? 'border-red-400 bg-red-50 animate-shake' : 'border-indigo-100 focus:border-indigo-400 focus:bg-indigo-50'}
                                            ${feedback === 'correct' ? 'border-green-400 bg-green-50' : ''}
                                        `}
                                        disabled={feedback === 'correct'}
                                    />
                                </div>
                            )}

                            <div className="flex gap-3 w-full max-w-xs">
                                {feedback === 'showAnswer' ? (
                                    <button 
                                        onClick={nextQuestion}
                                        className="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2 text-xl"
                                    >
                                        Siguiente <ArrowRight />
                                    </button>
                                ) : (
                                    <>
                                        <button 
                                            onClick={handleGiveUp}
                                            className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-600 font-bold py-3 rounded-xl shadow transition"
                                            title="Ver respuesta"
                                        >
                                            No lo sé 😓
                                        </button>
                                        <button 
                                            onClick={handleCheck}
                                            disabled={!userAnswer} 
                                            className={`flex-[2] font-bold py-3 rounded-xl shadow-lg transition transform text-xl text-white
                                                ${!userAnswer ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 active:scale-95'}
                                            `}
                                        >
                                            ¡Comprobar!
                                        </button>
                                    </>
                                )}
                            </div>

                            <div className="h-8 mt-2">
                                {feedback === 'correct' && (
                                    <p className="text-green-500 font-bold text-lg animate-bounce flex items-center gap-2">
                                        <Check size={24} /> ¡Excelente!
                                    </p>
                                )}
                                {feedback === 'incorrect' && (
                                    <p className="text-red-500 font-bold text-lg flex items-center gap-2">
                                        <X size={24} /> Inténtalo de nuevo
                                    </p>
                                )}
                                {feedback === 'showAnswer' && (
                                    <p className="text-indigo-500 font-bold text-sm">
                                        ¡Así se aprende! Repásalo y sigamos.
                                    </p>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    {/* Sección de Ayuda Visual Interactiva */}
                    <div className="mt-8 text-center transition-all w-full max-w-lg">
                        <div className="flex justify-between items-center mb-4 px-4">
                            <h3 className="text-sm font-bold text-indigo-800 uppercase tracking-wider">Ayuda Visual</h3>
                            <button 
                                onClick={() => setShowVisualHelp(!showVisualHelp)}
                                className={`flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold transition ${showVisualHelp ? 'bg-indigo-100 text-indigo-600' : 'bg-gray-200 text-gray-500'}`}
                            >
                                {showVisualHelp ? <><Eye size={14}/> Activada</> : <><EyeOff size={14}/> Desactivada</>}
                            </button>
                        </div>
                        
                        {showVisualHelp ? (
                            <div className="bg-white p-4 rounded-2xl shadow-inner border border-indigo-50">
                                <p className="text-xs text-gray-400 mb-2">{currentFactorA} grupos de {currentFactorB} puntos</p>
                                <div className="flex flex-col gap-2 items-center">
                                    {[...Array(currentFactorA)].map((_, rowIndex) => (
                                        <div key={rowIndex} className="flex gap-2">
                                            {[...Array(currentFactorB)].map((_, colIndex) => (
                                                <div key={colIndex} className="w-3 h-3 rounded-full bg-indigo-400 shadow-sm animate-pulse-slow"></div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="p-4 border-2 border-dashed border-gray-300 rounded-2xl text-gray-400 text-sm">
                                Ayuda visual oculta. <br/> ¡Tú puedes! 💪
                            </div>
                        )}
                    </div>
                    <style>{`
                        @keyframes pulse-slow {
                            0%, 100% { opacity: 1; transform: scale(1); }
                            50% { opacity: 0.8; transform: scale(0.95); }
                        }
                        .animate-pulse-slow {
                            animation: pulse-slow 3s infinite ease-in-out;
                        }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
